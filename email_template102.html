<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gateplus Verification Code</title>
  <style>
    
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #556582;
      color: #333333;
      line-height: 1.6;
    }

    
    .email-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 10px;
    }

    .email-container {
      max-width: 580px;
      width: 100%;
      background-color: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    
    .email-header {
      background-color: #3a4b5c;
      padding: 25px;
      text-align: center;
      color: #ffffff;
      font-size: 26px;
      font-weight: 700;
    }

    
    .email-body {
      padding: 30px 25px;
      font-size: 16px;
      color: #333333;
    }

    .email-body p {
      margin-bottom: 20px;
    }

    .code-box {
      display: inline-block;
      padding: 12px 20px;
      background-color: #f4f4f4;
      color: #3a4b5c;
      font-size: 22px;
      font-weight: bold;
      border-radius: 8px;
      letter-spacing: 2px;
      text-align: center;
    }

    
    .email-footer {
      background-color: #f4f4f4;
      color: #555555;
      text-align: center;
      padding: 18px 20px;
      font-size: 14px;
    }

    .email-footer a {
      color: #556582;
      text-decoration: none;
    }

    
    @media screen and (max-width: 480px) {
      .email-body {
        padding: 20px 15px;
        font-size: 15px;
      }

      .code-box {
        font-size: 20px;
        padding: 10px 16px;
      }

      .email-header {
        font-size: 22px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <div class="email-container">
      <div class="email-header">
        Gateplus Verification Code
      </div>
      <div class="email-body">
        <p>Hello,</p>
        <p>Your Gateplus login verification code is:</p>
        <p><span id="verification-code" class="code-box">******</span></p>
        <p>This code will expire in 5 minutes.</p>
        <p>If you did not request this, please ignore this email.</p>
        <p>Best regards,<br>The Gateplus Team</p>
      </div>
      <div class="email-footer">
        &copy; 2026 Gateplus. All rights reserved.<br>
        <a href="mailto:support@gateplus.com">Contact Support</a>
      </div>
    </div>
  </div>

</body>
</html>
